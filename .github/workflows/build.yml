name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Android SDK and install platform 36
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --list 2>/dev/null | grep "platforms;android-3" || true
          echo "Installing platform android-36..."
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" 2>&1 || echo "Install failed (maybe already installed)"

      - name: Build debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
